services:
  mysql-dev:
    image: mysql:8.0
    container_name: galactic-mysql
    environment:
      MYSQL_ROOT_PASSWORD: HardCodedPass!123
      MYSQL_DATABASE: galactic
    ports:
      - "127.0.0.1:11201:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/etc/mysql/init.sql
    command: --init-file /etc/mysql/init.sql
    restart: unless-stopped

volumes:
  mysql_data: